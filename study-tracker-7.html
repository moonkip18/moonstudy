<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.webmanifest">

<title>Study 400</title>
<style>
:root{
  --bg:#080808;--panel:#0d0d0d;--panel2:#101010;--line:#1e1e1e;--line2:#151515;
  --text:#ededed;--muted:#676767;--dim:#383838;--lime:#C8FF00;--red:#FF2020;--orange:#FF9F40;
  --cyan:#00D4FF;--green:#34D399;--pink:#F472B6;--violet:#C084FC;--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,"SF Mono","Courier New",monospace;-webkit-font-smoothing:antialiased;overflow:hidden;}
button,input,select,textarea{font-family:inherit;}
button{touch-action:manipulation;}
#app{height:100dvh;max-width:1120px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);}
#header{border-bottom:1px solid var(--line);padding:20px 22px 10px;flex-shrink:0;}
.hdate{font-size:9px;color:var(--muted);letter-spacing:.28em;text-transform:uppercase;margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pill{border:1px solid var(--line);background:#0b0b0b;color:#777;border-radius:999px;padding:4px 8px;font-size:8px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
.pill.lime{border-color:#C8FF0044;color:var(--lime);background:#C8FF000b;}.pill.red{border-color:#FF202044;color:#FF7055;background:#FF20200b;}.pill.orange{border-color:#FF9F4044;color:#FF9F40;background:#FF9F400b;}
.hrow{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:start;}
#timer{font-size:41px;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums;color:#e8e8e8;transition:color .4s,text-shadow .4s;}
#timer.adrenaline{color:var(--red);text-shadow:0 0 30px #FF202066,0 0 70px #FF202033;animation:ap 2s ease-in-out infinite;}
@keyframes ap{0%,100%{text-shadow:0 0 22px #FF202055,0 0 44px #FF202022;}50%{text-shadow:0 0 48px #FF202099,0 0 88px #FF202044;}}
.hmeta{text-align:right;min-width:108px;}
.level{font-size:22px;color:var(--lime);line-height:1;font-weight:700;}
.level small{font-size:9px;color:#555;font-weight:400;letter-spacing:.15em;display:block;margin-top:5px;text-transform:uppercase;}
.hsub{font-size:9px;color:#666;letter-spacing:.16em;text-transform:uppercase;margin-top:8px;min-height:14px;}
.bar{height:2px;background:#1b1b1b;border-radius:2px;overflow:hidden;}
.bar .fill{height:100%;background:var(--lime);border-radius:2px;transition:width .6s,background .4s,box-shadow .4s;}
.bar .fill.red{background:var(--red);box-shadow:0 0 10px #FF202066;}
.bar .fill.orange{background:var(--orange);}
.barmeta{font-size:8px;color:#555;letter-spacing:.12em;text-transform:uppercase;margin-top:5px;display:flex;justify-content:space-between;gap:8px;}
#statusline{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px;}
.statbox{border:1px solid var(--line2);background:#0b0b0b;border-radius:10px;padding:8px 6px;text-align:center;min-width:0;}
.statbox .v{font-size:13px;color:#ddd;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.statbox .k{font-size:7px;color:#555;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 18px;}
#content::-webkit-scrollbar{width:0;height:0;}
#nav{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-top:1px solid var(--line);background:#080808;padding:11px 0 calc(12px + env(safe-area-inset-bottom));flex-shrink:0;}
.nbtn{background:none;border:none;color:#3e3e3e;font-size:8px;letter-spacing:.21em;text-transform:uppercase;padding:8px 0;cursor:pointer;position:relative;}
.nbtn.on{color:var(--lime);}.nbtn.red{color:var(--red);} .navdot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--lime);box-shadow:0 0 6px var(--lime);margin-left:3px;vertical-align:middle;}
.grid{display:grid;gap:12px;}.grid2{display:grid;gap:12px;}.grid3{display:grid;gap:10px;grid-template-columns:repeat(3,1fr);}.grid4{display:grid;gap:8px;grid-template-columns:repeat(4,1fr);}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px;overflow:hidden;position:relative;}
.card.soft{background:#0a0a0a;border-color:#171717;}.card.glow{border-color:#C8FF0044;background:linear-gradient(180deg,#C8FF0010,#0d0d0d 60%);} .card.redglow{border-color:#FF202044;background:linear-gradient(180deg,#FF202014,#0d0d0d 60%);} 
.lbl{font-size:9px;color:#666;letter-spacing:.25em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.lbl span{letter-spacing:.08em;color:#444;font-size:8px;}.title{font-size:17px;color:#eee;letter-spacing:-.3px;line-height:1.25;}.sub{font-size:10px;color:#5c5c5c;line-height:1.55;margin-top:6px;}.big{font-size:28px;letter-spacing:-1px;line-height:1;color:#e8e8e8;font-variant-numeric:tabular-nums;}.tiny{font-size:8px;color:#555;letter-spacing:.1em;text-transform:uppercase;}.muted{color:#666}.lime{color:var(--lime)}.red{color:#FF7055}.orange{color:var(--orange)}.cyan{color:var(--cyan)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}.btnrow.tight{gap:5px;margin-top:9px;}
.btn{background:#0f0f0f;border:1px solid #222;color:#777;border-radius:11px;padding:11px 13px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .16s;line-height:1.1;}
.btn:active{transform:scale(.98);opacity:.8;}.btn.primary{background:var(--lime);border-color:var(--lime);color:#000;font-weight:800;}.btn.redb{background:#FF202014;border-color:#FF202055;color:#FF7055;}.btn.green{background:#C8FF0012;border-color:#C8FF0055;color:var(--lime);}.btn.full{width:100%;}.btn.min{padding:8px 10px;font-size:9px;border-radius:9px;}.btn:disabled{opacity:.35;cursor:default;}
.input,select,textarea{background:#0b0b0b;border:1px solid #202020;color:#ccc;border-radius:11px;padding:11px 12px;font-size:12px;outline:none;width:100%;}
.input:focus,select:focus,textarea:focus{border-color:#C8FF0066;color:#fff;} textarea{resize:vertical;min-height:74px;line-height:1.45;}
.formrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}.formrow.three{grid-template-columns:1fr 1fr 1fr;}.formrow.one{grid-template-columns:1fr;}.field label{display:block;font-size:8px;color:#555;letter-spacing:.14em;text-transform:uppercase;margin:0 0 5px 2px;}
.subject{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid #171717;cursor:pointer;position:relative;}
.subject:last-child{border-bottom:none;padding-bottom:0;}.subject:first-child{padding-top:0;}.subject:active{opacity:.72;}.sdot{width:8px;height:8px;border-radius:50%;background:#1e1e1e;box-shadow:none;}.sname{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.sname.on{color:#fff;}.stime{text-align:right;font-size:14px;color:#555;font-variant-numeric:tabular-nums;}.stime.on{font-weight:700;}.minirow{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}.tag{font-size:8px;color:#444;background:#101010;border:1px solid #1b1b1b;border-radius:999px;padding:4px 7px;letter-spacing:.08em;text-transform:uppercase;}.tag.lime{color:var(--lime);border-color:#C8FF003d;background:#C8FF000b}.tag.red{color:#FF7055;border-color:#FF202044;background:#FF20200b}.tag.orange{color:#FF9F40;border-color:#FF9F4044;background:#FF9F400b}.tag.cyan{color:#00D4FF;border-color:#00D4FF33;background:#00D4FF0b}
.checkgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}.check{border:1px solid #1d1d1d;background:#0b0b0b;border-radius:13px;padding:12px 10px;cursor:pointer;display:flex;align-items:center;gap:9px;min-height:50px;}.check.on{border-color:#C8FF0055;background:#C8FF000e;}.box{width:16px;height:16px;border-radius:5px;border:1px solid #333;display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:11px;flex-shrink:0;}.check.on .box{background:var(--lime);border-color:var(--lime);}.cktext{font-size:11px;color:#777;letter-spacing:.08em;text-transform:uppercase;}.check.on .cktext{color:#eee;}
.meter{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:10px;}.ring{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--lime) 0deg,#1a1a1a 0deg);position:relative;}.ring:before{content:"";position:absolute;inset:5px;border-radius:50%;background:#0d0d0d;}.ring span{position:relative;font-size:12px;color:#ddd;font-weight:700;}
.lesson{border-bottom:1px solid #171717;padding:12px 0;}.lesson:first-child{padding-top:0;}.lesson:last-child{border-bottom:none;padding-bottom:0;}.lessonTop{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:start;}.lessonTitle{font-size:13px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.lessonMeta{font-size:9px;color:#555;line-height:1.6;margin-top:4px;}.lessonScore{font-size:12px;color:var(--lime);white-space:nowrap;}.ranknum{font-size:9px;color:#444;letter-spacing:.1em;text-transform:uppercase;}
.insight{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;padding:11px 0;border-bottom:1px solid #161616;}.insight:last-child{border-bottom:none;padding-bottom:0;}.arrow{font-size:21px;line-height:1;width:24px;text-align:center;}.insight .head{font-size:12px;color:#ddd;line-height:1.35}.insight .body{font-size:10px;color:#5b5b5b;line-height:1.55;margin-top:3px;}.proj{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}.projcard{background:#0b0b0b;border:1px solid #191919;border-radius:13px;padding:11px;}.projcard .v{font-size:18px;color:#e8e8e8;letter-spacing:-.5px;}.projcard .k{font-size:8px;color:#555;text-transform:uppercase;letter-spacing:.13em;margin-top:5px;}.projcard .plus{font-size:9px;color:var(--lime);margin-top:6px;}
.hmwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}.hmwrap::-webkit-scrollbar{height:0;}.svgbox svg{display:block;width:100%;height:auto;}.lifeScore{font-size:31px;line-height:1;color:#e8e8e8;letter-spacing:-1px;}.scoreLabel{font-size:8px;color:#555;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}.splitbar{height:3px;border-radius:3px;background:#191919;overflow:hidden;display:flex;margin-top:10px;}.splitseg{height:100%;}.soundrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}.soundbtn{background:#0f0f0f;border:1px solid #1e1e1e;color:#666;font-size:9px;padding:9px 11px;border-radius:999px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;}.soundbtn.on{border-color:#C8FF0055;color:var(--lime);background:#C8FF0012;}
.toast{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);z-index:2000;background:var(--lime);color:#000;padding:13px 22px;border-radius:14px;font-weight:800;font-size:13px;pointer-events:none;animation:toast 2.3s forwards;max-width:min(88vw,420px);text-align:center;}.toast.red{background:var(--red);color:#fff}.toast.info{background:#171717;color:#aaa;border:1px solid #2b2b2b}.toast.gold{background:linear-gradient(135deg,#FFD700,#FF9F00);color:#000}@keyframes toast{0%{opacity:0;transform:translate(-50%,-60%) scale(.94)}14%{opacity:1;transform:translate(-50%,-50%) scale(1)}78%{opacity:1}100%{opacity:0;transform:translate(-50%,-44%) scale(.98)}}
.modal{position:fixed;inset:0;background:#000000c8;z-index:1500;display:grid;place-items:end center;padding:12px;}.sheet{background:#0f0f0f;border:1px solid #242424;border-radius:20px;padding:18px;width:100%;max-width:460px;}.colors{display:flex;gap:10px;flex-wrap:wrap}.swatch{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer}.swatch.sel{border-color:#fff;transform:scale(1.12)}
.hidden{display:none!important}.spacer{height:10px}.danger{border-color:#FF202044!important;color:#FF7055!important;background:#FF20200b!important}.right{text-align:right}.center{text-align:center}.nowrap{white-space:nowrap}.smallnote{font-size:9px;color:#444;line-height:1.6;margin-top:10px;}
@media (min-width:760px){
  #app{padding:0 14px;}#header{border-left:1px solid var(--line);border-right:1px solid var(--line);border-radius:0 0 22px 22px;padding-left:24px;padding-right:24px;}#content{padding:16px 0 18px;}#nav{border:1px solid var(--line);border-radius:20px 20px 0 0;margin:0 auto;width:min(720px,100%);padding-bottom:12px;}.grid2{grid-template-columns:1.08fr .92fr}.grid3.desktop4{grid-template-columns:repeat(4,1fr)}.wide{grid-column:1/-1}.card{padding:17px}.todayLayout{display:grid;grid-template-columns:1.08fr .92fr;gap:12px}.intelLayout{display:grid;grid-template-columns:1fr 1fr;gap:12px}.lifeLayout{display:grid;grid-template-columns:.95fr 1.05fr;gap:12px}
}
@media (max-width:520px){body{max-width:440px;margin:0 auto}.grid3{grid-template-columns:repeat(3,1fr)}.grid4{grid-template-columns:repeat(2,1fr)}.proj{grid-template-columns:1fr}.formrow.three{grid-template-columns:1fr 1fr}.hrow{grid-template-columns:1fr auto}#timer{font-size:40px}.hmeta{min-width:86px}.level{font-size:19px}.checkgrid{grid-template-columns:1fr 1fr}.btn{padding:10px 11px}}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="hdate" id="hdate"></div>
    <div class="hrow">
      <div>
        <div id="timer">0:00:00</div>
        <div id="sessionline" class="hsub"></div>
      </div>
      <div class="hmeta">
        <div class="level" id="levelText">LV 1<small id="xpText">0 XP</small></div>
      </div>
    </div>
    <div style="margin-top:12px">
      <div class="bar"><div class="fill" id="goalFill"></div></div>
      <div class="barmeta"><span id="goalPct">0%</span><span id="goalMeta">daily goal</span></div>
    </div>
    <div id="statusline"></div>
  </header>
  <main id="content"></main>
  <nav id="nav">
    <button class="nbtn on" id="nav-today" onclick="go('today')">today</button>
    <button class="nbtn" id="nav-plan" onclick="go('plan')">plan</button>
    <button class="nbtn" id="nav-life" onclick="go('life')">life</button>
    <button class="nbtn" id="nav-intel" onclick="go('intel')">intel</button>
    <button class="nbtn" id="nav-edit" onclick="go('edit')">edit</button>
  </nav>
</div>
<script>
const APP_KEY='study400_v1';
const LEGACY_KEYS=['subjects_v2','subjects','goal_h'];
const PAL=['#C8FF00','#00D4FF','#FF7055','#FF9F40','#C084FC','#34D399','#F472B6','#60A5FA','#FBBF24','#A78BFA','#FB923C','#2DD4BF'];
const ADR='#FF2020';
const MS=[10,25,50,100,250,500,1000,2000,5000,10000];
let state=null,tab='today',editingSubject=null,chartDays=30,audioCtx=null,snd=null,sndGain=null,sndType=null,wakeLock=null;
const $=id=>document.getElementById(id);
const S=n=>String(n).padStart(2,'0');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function uid(){return 'x'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-5)}
function dateKey(d){return d.getFullYear()+'-'+S(d.getMonth()+1)+'-'+S(d.getDate())}
function todayKey(){return dateKey(new Date())}
function parseKey(k){const p=k.split('-').map(Number);return new Date(p[0],p[1]-1,p[2])}
function addDays(k,n){const d=parseKey(k);d.setDate(d.getDate()+n);return dateKey(d)}
function diffDays(a,b){return Math.round((parseKey(b)-parseKey(a))/86400000)}
function hms(sec){sec=Math.max(0,Math.floor(sec));return Math.floor(sec/3600)+':'+S(Math.floor(sec%3600/60))+':'+S(sec%60)}
function hm(sec){sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60);return h===0?m+'m':m===0?h+'h':h+'h '+m+'m'}
function h1(min){min=Math.max(0,Math.round(min));const h=Math.floor(min/60),m=min%60;return h===0?m+'m':m===0?h+'h':h+'h '+m+'m'}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function ls(k,fb){try{const v=JSON.parse(localStorage.getItem(k));return v==null?fb:v}catch{return fb}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function minOfTime(t){if(!t)return null;const p=t.split(':');return Number(p[0])*60+Number(p[1])}
function timeFromMin(m){m=((Math.round(m)%1440)+1440)%1440;return S(Math.floor(m/60))+':'+S(m%60)}
function prettyTime(t){if(!t)return '—';let m=minOfTime(t);if(m==null||isNaN(m))return '—';let h=Math.floor(m/60),mm=m%60,ap=h>=12?'pm':'am';h=h%12||12;return h+(mm?':'+S(mm):'')+ap}
function subject(id){return state.subjects.find(s=>s.id===id)||state.subjects[0]||{id:'',name:'Subject',color:PAL[0],goalMin:0}}
function lesson(id){return state.lessons.find(l=>l.id===id)||null}
function defaultDay(){return {study:{},sessions:[],habits:{gym:false,walk:false,water:false,review:false,noScroll:false,plan:false},sleep:{bed:'',wake:'',minutes:0,quality:0},life:{mood:3,energy:3,stress:3,start:'',notes:''},grades:[]}}
function day(k=todayKey()){if(!state.days[k])state.days[k]=defaultDay();hydrateDay(state.days[k]);return state.days[k]}
function peekDay(k){return state.days[k]?hydrateDay(state.days[k]):defaultDay()}
function hydrateDay(d){d.study=d.study||{};d.sessions=d.sessions||[];d.habits=Object.assign({gym:false,walk:false,water:false,review:false,noScroll:false,plan:false},d.habits||{});d.sleep=Object.assign({bed:'',wake:'',minutes:0,quality:0},d.sleep||{});d.life=Object.assign({mood:3,energy:3,stress:3,start:'',notes:''},d.life||{});d.grades=d.grades||[];return d}
function defaultState(){const ids=[uid(),uid(),uid()];return {version:1,createdAt:new Date().toISOString(),startDate:todayKey(),settings:{dailyGoalMin:360,targetStart:'09:00',missionDays:400},subjects:[{id:ids[0],name:'Math',color:PAL[0],goalMin:120},{id:ids[1],name:'Physics',color:PAL[1],goalMin:90},{id:ids[2],name:'Biology',color:PAL[2],goalMin:60}],lessons:[{id:uid(),title:'Add your first real lesson',subjectId:ids[0],difficulty:3,due:todayKey(),interval:0,reps:0,ease:2.5,lastScore:0,lastStudied:null,minutes:0,archived:false}],days:{},active:null,soundVol:.55}}
function loadState(){let raw=ls(APP_KEY,null);if(raw){state=raw}else{state=migrateLegacyLocal()||defaultState()}hydrateState();save()}

function setSleep(){const d=day();d.sleep.bed=$('bedInput').value;d.sleep.wake=$('wakeInput').value;d.sleep.quality=Number($('sleepQuality').value||0);if(d.sleep.bed&&d.sleep.wake){let b=minOfTime(d.sleep.bed),w=minOfTime(d.sleep.wake);let dur=w-b;if(dur<=0)dur+=1440;d.sleep.minutes=dur}else d.sleep.minutes=0;save();renderLife();updateHeader()}

function dailyRows(days=null){let keys=Object.keys(state.days).sort();if(days){const start=addDays(todayKey(),-(days-1));keys=keys.filter(k=>k>=start&&k<=todayKey())}return keys.map(k=>{const d=day(k),studyMin=Object.values(d.study).reduce((a,b)=>a+Number(b||0),0)/60+(k===todayKey()&&state.active?liveTodaySec()/60:0);return {k,d,studyMin,habits:d.habits,sleepMin:d.sleep.minutes||0,wakeMin:minOfTime(d.sleep.wake),startMin:minOfTime(d.life.start),mood:d.life.mood,energy:d.life.energy,stress:d.life.stress,sessions:d.sessions}})}
function habitInsights(){const rows=dailyRows().filter(r=>r.studyMin>0||r.sleepMin||Object.values(r.habits).some(Boolean)||r.startMin!=null);if(rows.length<7)return {rows,html:`<div class="sub">Log at least 7 days to unlock real pattern detection. Right now the app is collecting study, gym, sleep, wake time, start time, mood, and energy.</div>`};let items=[];function add(title,body,score,dir='→',kind=''){items.push({title,body,score:Math.abs(score||0),dir,kind})}
  const gymYes=rows.filter(r=>r.habits.gym),gymNo=rows.filter(r=>!r.habits.gym);if(gymYes.length>=2&&gymNo.length>=2){const dy=avg(gymYes.map(r=>r.studyMin)),dn=avg(gymNo.map(r=>r.studyMin)),diff=dy-dn;add('Gym days: '+(diff>=0?'+':'')+h1(Math.abs(diff)),'Average study is '+h1(dy)+' on gym days vs '+h1(dn)+' on non-gym days.',diff,diff>=0?'↑':'↓',diff>=0?'lime':'red')}
  const early=rows.filter(r=>r.startMin!=null&&r.startMin<=minOfTime(state.settings.targetStart)),late=rows.filter(r=>r.startMin!=null&&r.startMin>minOfTime(state.settings.targetStart));if(early.length>=2&&late.length>=2){const de=avg(early.map(r=>r.studyMin)),dl=avg(late.map(r=>r.studyMin)),diff=de-dl;add('Early-start effect: '+(diff>=0?'+':'')+h1(Math.abs(diff)),'Before target start averages '+h1(de)+' vs '+h1(dl)+' after target.',diff,diff>=0?'↑':'↓',diff>=0?'lime':'orange')}
  const sw=rows.filter(r=>r.sleepMin>0);if(sw.length>=5){const r=pearson(sw.map(x=>x.sleepMin),sw.map(x=>x.studyMin));add('Sleep duration correlation: '+r.toFixed(2),r>0?'More sleep has aligned with more study.':'More sleep has not aligned with more study yet; check quality and start time.',r*120,r>=0?'↑':'↓',r>=0?'lime':'orange')}
  const st=rows.filter(r=>r.startMin!=null);if(st.length>=5){const r=pearson(st.map(x=>x.startMin),st.map(x=>x.studyMin));add('Start-time correlation: '+r.toFixed(2),r<0?'Earlier starts currently align with more study.':'Later starts currently align with more study. Protect the time that actually works.',r*120,r<0?'↑':'→',r<0?'lime':'cyan')}
  const en=rows.filter(r=>r.energy);if(en.length>=5){const r=pearson(en.map(x=>x.energy),en.map(x=>x.studyMin));add('Energy correlation: '+r.toFixed(2),r>0?'Higher energy days are linked to more output.':'Energy rating is not predicting output yet.',r*120,r>0?'↑':'→',r>0?'lime':'')}
  if(!items.length)return {rows,html:'<div class="sub">Not enough variety yet. Try logging gym, sleep, and start time for one more week.</div>'};items.sort((a,b)=>b.score-a.score);return {rows,items,html:items.slice(0,5).map(it=>`<div class="insight"><div class="arrow ${it.kind}">${it.dir}</div><div><div class="head">${esc(it.title)}</div><div class="body">${esc(it.body)}</div></div></div>`).join('')};}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function pearson(x,y){const n=Math.min(x.length,y.length);if(n<2)return 0;const mx=avg(x),my=avg(y);let num=0,dx=0,dy=0;for(let i=0;i<n;i++){const a=x[i]-mx,b=y[i]-my;num+=a*b;dx+=a*a;dy+=b*b}return dx&&dy?num/Math.sqrt(dx*dy):0}
function habitModel(){const ins=habitInsights();let gymPenalty=false;if(ins.items){const g=ins.items.find(x=>x.title.startsWith('Gym days'));gymPenalty=!!(g&&g.dir==='↓'&&g.score>30)}return {gymPenalty}}
function projections(){const rows14=calendarRows(14),rows30=calendarRows(30);const avg14=avg(rows14.map(r=>r.studyMin)),avg30=avg(rows30.map(r=>r.studyMin));const trend=avg(rows14.slice(7).map(r=>r.studyMin))-avg(rows14.slice(0,7).map(r=>r.studyMin));const sleepAvg=avg(rows30.filter(r=>r.sleepMin).map(r=>r.sleepMin));const gymRate=rows30.filter(r=>r.habits.gym).length/30;const base=Math.max(0,avg14+trend*.18);let lift=.08;if(avg14<state.settings.dailyGoalMin)lift+=.12;if(sleepAvg&&sleepAvg<420)lift+=.08;if(gymRate<.45)lift+=.05;const improved=Math.min(state.settings.dailyGoalMin*1.15,base*(1+clamp(lift,0,.36)));const horizons=[30,90,180,365];return {base,improved,avg14,avg30,trend,horizons:horizons.map(d=>projectAt(d,base,improved))}}

function nextExperimentHTML(ins){if(!ins.items||!ins.items.length)return '<div class="sub">For the next 7 days: log sleep, gym, wake time, first study start, and energy. The app will discover your personal patterns.</div>';const top=ins.items[0];let txt='Repeat the strongest positive pattern for 7 days and compare your average.';if(top.title.startsWith('Gym days')&&top.dir==='↓')txt='Do your hardest study block before the gym for 7 days. Your current data suggests gym days reduce study time.';else if(top.title.startsWith('Early-start')&&top.dir==='↑')txt='Protect the first block before your target start time for 7 days. Your data says it produces more study.';else if(top.title.startsWith('Start-time')&&top.body.includes('Later'))txt='Your later starts currently work better. Schedule a protected late-morning block instead of forcing early work.';else if(top.title.startsWith('Sleep'))txt='Run a 7-day sleep experiment: keep 7–9 hours and do one retrieval block the next morning.';return `<div class="title">${esc(top.title)}</div><div class="sub">${esc(txt)}</div><div class="btnrow"><button class="btn primary" onclick="day().habits.plan=true;save();renderIntel()">mark experiment planned</button></div>`}
function calendarRows(n){const out=[];for(let i=n-1;i>=0;i--){const k=addDays(todayKey(),-i),d=peekDay(k);out.push({k,d,studyMin:totalSecFor(k)/60,habits:d.habits,sleepMin:d.sleep.minutes||0})}return out}
function buildMissionMap(){const mi=missionInfo();const start=parseKey(state.startDate);const cell=7,gap=2,cols=40,rows=Math.ceil(mi.total/cols),w=cols*(cell+gap),h=rows*(cell+gap)+14;let rects='',labs='';for(let i=0;i<mi.total;i++){const d=new Date(start);d.setDate(start.getDate()+i);const k=dateKey(d);const sec=totalSecFor(k);let fill='#141414';if(sec>0){const p=sec/(state.settings.dailyGoalMin*60);fill=p>=1?'#C8FF00':p>=.66?'#80cc28':p>=.33?'#4a9918':'#1a3a08'}if(i+1===mi.day)fill=sec>0?'#FF9F40':'#333';const x=(i%cols)*(cell+gap),y=14+Math.floor(i/cols)*(cell+gap);rects+=`<rect x="${x}" y="${y}" width="${cell}" height="${cell}" rx="1.5" fill="${fill}"><title>Day ${i+1} · ${k}</title></rect>`;if(i%100===0)labs+=`<text x="${x}" y="8" fill="#555" font-size="7" font-family="monospace">${i+1}</text>`}return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${labs}${rects}</svg>`}
function lineSVG(n){const rows=calendarRows(n),W=360,H=150,pL=28,pB=22,pT=8,pR=8,cW=W-pL-pR,cH=H-pT-pB,max=Math.max(.5,...rows.map(r=>r.studyMin/60));const xp=i=>pL+(i/(n-1))*cW,yp=h=>pT+(1-h/max)*cH;let pts=rows.map((r,i)=>`${xp(i).toFixed(1)},${yp(r.studyMin/60).toFixed(1)}`).join(' ');let area=`M${pL},${pT+cH} L${pts} L${pL+cW},${pT+cH} Z`;let dots=rows.map((r,i)=>r.studyMin>0?`<circle cx="${xp(i).toFixed(1)}" cy="${yp(r.studyMin/60).toFixed(1)}" r="1.6" fill="#C8FF00"/>`:'' ).join('');let labs='';for(let j=0;j<3;j++){const v=(max*j/2).toFixed(1),y=pT+(1-j/2)*cH+3;labs+=`<text x="${pL-5}" y="${y}" fill="#555" font-size="8" text-anchor="end" font-family="monospace">${v}</text>`}return `<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="lgg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8FF00" stop-opacity=".14"/><stop offset="100%" stop-color="#C8FF00" stop-opacity="0"/></linearGradient></defs>${labs}<path d="${area}" fill="url(#lgg)"/><polyline points="${pts}" fill="none" stroke="#C8FF00" stroke-width="1.6" stroke-linejoin="round"/>${dots}</svg>`}

function toast(msg,type=''){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}
function initAudio(){if(audioCtx)return;const AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC()}
function noiseBuffer(type){const sr=audioCtx.sampleRate,len=sr*6,buf=audioCtx.createBuffer(2,len,sr);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);if(type==='white'||type==='alpha'){for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*.45}else if(type==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)/9;b6=w*.115926}}else{let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;last=(last+.02*w)/1.02;d[i]=last*3.2}}}return buf}
function stopSound(){try{if(snd)snd.stop();if(sndGain)sndGain.disconnect()}catch{}snd=null;sndGain=null;sndType=null;render()}
function toggleSound(type){if(sndType===type){stopSound();return}try{if(snd)snd.stop()}catch{}initAudio();if(!audioCtx)return toast('Audio not supported','red');audioCtx.resume();sndGain=audioCtx.createGain();sndGain.gain.value=state.soundVol||.55;sndGain.connect(audioCtx.destination);if(type==='alpha'){const merger=audioCtx.createChannelMerger(2);merger.connect(sndGain);const l=audioCtx.createOscillator(),r=audioCtx.createOscillator();l.type=r.type='sine';l.frequency.value=200;r.frequency.value=210;l.connect(merger,0,0);r.connect(merger,0,1);l.start();r.start();snd={stop:()=>{l.stop();r.stop()}}}else{snd=audioCtx.createBufferSource();snd.buffer=noiseBuffer(type);snd.loop=true;snd.connect(sndGain);snd.start()}sndType=type;render()}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){if(state.active)reqWake();updateHeader()}else save()});
setInterval(()=>{if(state&&state.active){updateHeader();if(tab==='today'){state.subjects.forEach(s=>{const el=document.querySelector(`[data-time="${s.id}"]`);if(el)el.textContent=hms(studySecFor(todayKey(),s.id))})}}},1000);
window.addEventListener('beforeunload',save);
if('serviceWorker'in navigator&&location.protocol!=='file:'){navigator.serviceWorker.register('sw.js').catch(()=>{})}
loadState();render();
</script>
