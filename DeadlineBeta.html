<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:#080808;--bg2:#0d0d0d;--bg3:#111;--bg4:#161616;
  --border:#1a1a1a;--border2:#1e1e1e;--border3:#252525;
  --t1:#e8e8e8;--t2:#999;--t3:#666;--t4:#444;--t5:#2e2e2e;
  --acc:#C8FF00;--adr:#FF2020;--warn:#FF9F40;--red:#FF7055;
  --focus-ring:0 0 0 2px #C8FF0077;
  --reduce-motion:0;
}
.light{
  --bg:#f5f5f0;--bg2:#ebebe5;--bg3:#e2e2dc;--bg4:#d8d8d2;
  --border:#d0d0c8;--border2:#c8c8c0;--border3:#bdbdb5;
  --t1:#111;--t2:#444;--t3:#666;--t4:#888;--t5:#aaa;
  --acc:#5a8a00;--adr:#cc0000;--warn:#c07000;--red:#cc4422;
}
@media(prefers-reduced-motion:reduce){:root{--reduce-motion:1;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--t1);font-family:ui-monospace,'SF Mono','Courier New',monospace;max-width:440px;margin:0 auto;display:flex;flex-direction:column;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* ── SKIP LINK ───────────────────────────────────── */
.skip-link{position:absolute;top:-40px;left:0;background:var(--acc);color:#000;padding:8px 14px;font-size:12px;z-index:9999;border-radius:0 0 8px 0;transition:top .2s;}
.skip-link:focus{top:0;}

/* ── LOGIN SCREEN ────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
#login-screen.hidden{display:none;}
.login-logo{font-size:36px;letter-spacing:-2px;color:var(--t1);margin-bottom:4px;font-weight:700;}
.login-tagline{font-size:10px;color:var(--t3);letter-spacing:.3em;text-transform:uppercase;margin-bottom:48px;}
.login-divider{display:flex;align-items:center;width:100%;max-width:320px;margin:24px 0;gap:12px;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border2);}
.login-divider span{font-size:8px;color:var(--t4);letter-spacing:.2em;text-transform:uppercase;}
.login-btn{width:100%;max-width:320px;padding:14px;border-radius:12px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),opacity 0.2s;border:none;letter-spacing:.04em;margin-bottom:10px;}
.login-btn:active{transform:scale(0.98);opacity:0.9;}
.login-btn:focus{outline:none;box-shadow:var(--focus-ring);}
.login-btn.google{background:#ffffff;color:#1a1a1a;border:1px solid #e0e0e0;}
.login-btn.google:hover{background:#f5f5f5;}
.login-btn.apple{background:#000000;color:#ffffff;border:1px solid #333;}
.login-btn.apple:hover{background:#1a1a1a;}
.login-btn.anonymous{background:transparent;color:var(--t2);border:1px solid var(--border2);font-size:11px;}
.login-btn.anonymous:hover{background:var(--bg2);color:var(--t1);}
.login-btn svg{width:18px;height:18px;flex-shrink:0;}
.login-spinner{width:16px;height:16px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:lspin 0.6s linear infinite;display:none;}
.login-btn.loading .login-spinner{display:inline-block;}
.login-btn.loading .login-btn-text{opacity:0.5;}
@keyframes lspin{to{transform:rotate(360deg);}}
.login-error{font-size:9px;color:#FF5555;letter-spacing:.1em;text-align:center;margin-top:12px;min-height:14px;}
.login-footer{font-size:8px;color:var(--t5);letter-spacing:.15em;text-align:center;margin-top:auto;padding-bottom:20px;}

/* ── DISPLAY NAME MODAL ──────────────────────────── */
.name-modal{position:fixed;inset:0;background:#000000bb;z-index:2100;display:none;align-items:center;justify-content:center;padding:24px;}
.name-modal.show{display:flex;}
.name-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px 24px;width:100%;max-width:360px;}
.name-title{font-size:12px;color:var(--t1);letter-spacing:.05em;margin-bottom:6px;font-weight:600;}
.name-subtitle{font-size:9px;color:var(--t4);letter-spacing:.08em;margin-bottom:20px;}
.name-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--t1);font-size:13px;font-family:inherit;padding:12px 14px;outline:none;margin-bottom:16px;autocapitalize:off;autocomplete:off;spellcheck:false;}
.name-input:focus{border-color:var(--acc);box-shadow:var(--focus-ring);}
.name-buttons{display:flex;gap:8px;}
.name-btn{flex:1;padding:11px;border-radius:10px;font-size:12px;font-family:inherit;cursor:pointer;letter-spacing:.06em;border:1px solid var(--border2);background:var(--bg3);color:var(--t3);transition:transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);}
.name-btn:focus{outline:none;box-shadow:var(--focus-ring);}
.name-btn:active{transform:scale(0.98);}
.name-btn.primary{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600;}

/* ── HEADER ──────────────────────────────────────── */
#bgbar{display:none;background:var(--bg3);border-bottom:1px solid var(--border);padding:5px 24px;font-size:9px;color:var(--t3);letter-spacing:.18em;text-transform:uppercase;flex-shrink:0;align-items:center;justify-content:space-between;}
#bgbar.show{display:flex;}
#bgbar span{color:var(--t2);}
#header{padding:22px 24px 0;border-bottom:1px solid var(--border2);flex-shrink:0;}
.hdate{font-size:9px;color:var(--t3);letter-spacing:.28em;text-transform:uppercase;margin-bottom:8px;}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;}
#htimer{font-size:40px;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1;color:var(--t1);transition:color .6s;}
#htimer.adrenaline{color:var(--adr);}
@media(prefers-reduced-motion:no-preference){#htimer.adrenaline{text-shadow:0 0 30px #FF202066,0 0 60px #FF202033;animation:ap 2s ease-in-out infinite;}}
@keyframes ap{0%,100%{text-shadow:0 0 20px #FF202055,0 0 40px #FF202022;}50%{text-shadow:0 0 44px #FF202099,0 0 80px #FF202044;}}
.streak{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px;margin-top:6px;}
.streak b{color:var(--warn);font-size:15px;}
#mode-label{font-size:8px;letter-spacing:.3em;text-transform:uppercase;margin-top:4px;height:10px;transition:color .5s;}
#mode-label.adrenaline{color:#FF202099;}
.srow2{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
#hsession{font-size:9px;color:var(--t3);letter-spacing:.18em;text-transform:uppercase;}
#beyond{font-size:9px;color:#FF202088;letter-spacing:.12em;display:none;}
#beyond.show{display:block;}
.gbwrap{margin:11px 0 15px;}
.gb{height:2px;background:var(--border2);border-radius:2px;}
#gbfill{height:100%;width:0;border-radius:2px;transition:width .8s,background .6s;}
#gbfill.adrenaline{background:var(--adr)!important;}
.gpct{font-size:8px;color:var(--t3);letter-spacing:.12em;margin-top:4px;display:flex;justify-content:space-between;}

/* sync + theme toggle row */
.htoolrow{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--t4);letter-spacing:.12em;text-transform:uppercase;cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:none;font-family:inherit;transition:transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);}
.sync-pill:focus{outline:none;box-shadow:var(--focus-ring);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .4s;}
.sdot.synced{background:var(--acc);}
@media(prefers-reduced-motion:no-preference){.sdot.syncing{animation:sdp .8s ease-in-out infinite;}}
.sdot.syncing{background:var(--warn);}
.sdot.error,.sdot.offline{background:#FF5555;}
@keyframes sdp{0%,100%{opacity:.4}50%{opacity:1}}
.htools{display:flex;gap:6px;align-items:center;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t3);font-size:13px;padding:3px 8px;cursor:pointer;font-family:inherit;line-height:1.4;transition:transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);}
.icon-btn:focus{outline:none;box-shadow:var(--focus-ring);}
.icon-btn:hover{border-color:var(--border3);color:var(--t2);}
.icon-btn:active{transform:scale(0.98);}
</style>
</head>

<script>
// ════════════════════════════════════════════════════
// FIREBASE CONFIG
// ════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyA9xk2rDZXE9Ro2hbIqfkZwMmQwgY7S3LM",
  authDomain: "deadlines---study-tracker.firebaseapp.com",
  projectId: "deadlines---study-tracker",
  storageBucket: "deadlines---study-tracker.firebasestorage.app",
  messagingSenderId: "679495334937",
  appId: "1:679495334937:web:9c7cc579bef986542f3e88"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

// Initialize services
const auth = firebase.auth();
let db = null; // DO NOT initialize yet - wait for auth ready

console.log('Firebase initialized successfully');

// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const PAL=['#C8FF00','#00D4FF','#FF7055','#FF9F40','#C084FC','#34D399','#F472B6','#60A5FA','#FBBF24','#A78BFA','#FB923C','#2DD4BF'];
const ADR='#FF2020';
const MS=[10,25,50,100,250,500,1000,2000,5000];
const SOUNDS={
  gamma:{n:'40 Hz',sub:'Flow State',desc:'Gamma binaural beats (40 Hz) — strongest evidence for focus. 40 Hz neural oscillations linked to high-level cognition. Requires headphones for binaural effect.',phones:true},
  brown:{n:'Brown',sub:'Deep Rumble',desc:'Brownian noise — a deep, low-frequency rumble like strong rain. Best for blocking distracting voices and low-frequency sounds.',phones:false},
  pink:{n:'Pink',sub:'Balanced',desc:'Pink noise (1/f) — power decreases per octave like waterfalls. Improves memory consolidation and reduces cortisol.',phones:false},
  alpha:{n:'α 10Hz',sub:'Calm Focus',desc:'Alpha binaural beats (10 Hz) — relaxed but alert. Ideal for reading and problem-solving. Requires headphones.',phones:true},
  white:{n:'White',sub:'Mask All',desc:'White noise — equal energy at every frequency. Best for masking unpredictable sounds that interrupt flow.',phones:false}
};

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let subjects=[],log={},active=null,live=0,t0=null,ticker=null;
let tab='today',range='1M',chartMo=new Date().getMonth(),chartYr=new Date().getFullYear();
let adrMode=false,goalReached=false,cpTarget=null,statsRange='week',lbRange='today';
let wakeLock=null,_lightMode=false;
let audioCtx=null,sndNoise=null,sndOscs=[],sndGain=null,sndPlaying=null;
let sndVol=0.6,sndOpen=false;
let pomoRunning=false,pomoPhase='work',pomoRemain=0,pomoTicker=null;
let pomoCfg={work:25,shortBreak:5,longBreak:15,rounds:4};
let pomoRound=0;
let sessEditTarget=null;
let _rafPending=false,_lsWriteQ={};
let _domCache={};
let syncUserId=null,syncUsername='';
let authInitialized=false;

// ════════════════════════════════════════════════════
// STORAGE — throttled + safe
// ════════════════════════════════════════════════════
const S=n=>String(n).padStart(2,'0');
const dkeyFor=d=>`${d.getFullYear()}-${S(d.getMonth()+1)}-${S(d.getDate())}`;
const todayKey=()=>dkeyFor(new Date());

function ls(k,fb){
  try{const v=JSON.parse(localStorage.getItem(k));return v!=null?v:fb;}catch{return fb;}
}

const _lsQueue={};let _lsTimer=null;
function ss(k,v){
  _lsQueue[k]=JSON.stringify(v);
  if(!_lsTimer)_lsTimer=setTimeout(_flushLS,200);
}
function _flushLS(){
  _lsTimer=null;
  for(const[k,v] of Object.entries(_lsQueue)){
    try{localStorage.setItem(k,v);}catch(e){console.warn('LS write fail',k,e);}
    delete _lsQueue[k];
  }
}
function ssNow(k,v){
  delete _lsQueue[k];
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
}

window.addEventListener('beforeunload',()=>{
  _flushLS();
  if(active&&t0){
    const added=Math.floor((Date.now()-t0)/1000);
    const currentLog=ls('log:'+todayKey(),{});
    currentLog[active]=(currentLog[active]||0)+added;
    try{localStorage.setItem('log:'+todayKey(),JSON.stringify(currentLog));
        localStorage.setItem('_t0',JSON.stringify(t0));
        localStorage.setItem('_active',JSON.stringify(active));}catch{}
  }
});

const fmt=s=>{s=Math.max(0,Math.floor(s));return`${Math.floor(s/3600)}:${S(Math.floor(s%3600/60))}:${S(s%60)}`};
const fmtH=s=>{if(s<=0)return'0m';const h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h===0?m+'m':m===0?h+'h':h+'h\u202f'+m+'m';};
const hl=h=>h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';
const vib=p=>{try{navigator.vibrate&&navigator.vibrate(p);}catch{}};
const ggs=()=>ls('goal_h',6)*3600;
const sgs=name=>{const s=subjects.find(x=>x.name===name);return s&&s.goal_h>0?s.goal_h*3600:0;};
const sc=name=>{const s=subjects.find(x=>x.name===name);return s?s.color:PAL[0];};
const total=()=>Object.values(log).reduce((a,b)=>a+b,0)+(active?live:0);
const ssec=name=>active===name?(log[name]||0)+live:(log[name]||0);
function announce(msg){const el=document.getElementById('a11y-live');if(el)el.textContent=msg;}

// ════════════════════════════════════════════════════
// FIRESTORE INITIALIZATION (after auth ready)
// ════════════════════════════════════════════════════
async function initializeFirestore() {
  if (db) return; // Already initialized
  
  db = firebase.firestore();
  
  // Enable persistence AFTER Firestore is initialized and user is auth'd
  db.enablePersistence().catch((err) => {
    if (err.code === 'failed-precondition') {
      console.warn('Persistence: multiple tabs');
    }
  });
  
  console.log('Firestore initialized with persistence');
}

// ════════════════════════════════════════════════════
// FIRESTORE OPERATIONS
// ════════════════════════════════════════════════════

async function syncToFirestore(payload) {
  if (!db || !syncUserId) return;
  try {
    await db.collection('users').doc(syncUserId).set(payload, { merge: true });
    document.getElementById('sm-status').textContent = 'Synced!';
    setTimeout(() => {
      document.getElementById('sm-status').textContent = '';
    }, 1500);
  } catch (err) {
    console.error('Firestore sync error:', err);
    document.getElementById('sm-status').textContent = 'Sync failed';
  }
}

async function loadFromFirestore() {
  if (!db || !syncUserId) return null;
  try {
    const doc = await db.collection('users').doc(syncUserId).get();
    if (doc.exists) {
      return doc.data();
    }
  } catch (err) {
    console.error('Firestore load error:', err);
  }
  return null;
}

async function pushLeaderboardFirestore() {
  if (!db || !syncUserId || !syncUsername) return;
  const allTime = allTimeSec();
  try {
    await db.collection('leaderboard').doc(syncUserId).set({
      username: syncUsername,
      allTimeSeconds: allTime,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (err) {
    console.error('Leaderboard push error:', err);
  }
}

function buildPayload() {
  return {
    subjects: subjects,
    log: log,
    username: syncUsername,
    timestamp: new Date().toISOString()
  };
}

// DAY ROLLOVER
// ════════════════════════════════════════════════════
let lastDayCheck=todayKey();
function checkDayRollover(){
  const today=todayKey();
  if(today!==lastDayCheck){
    lastDayCheck=today;
    log=ls('log:'+today,{});
    goalReached=false;ssNow('gr:'+today,false);
    clearPersistedTimer();active=null;live=0;t0=null;
    if(ticker){clearInterval(ticker);ticker=null;}
    render();
  }
}

// ════════════════════════════════════════════════════
// SYNC QUEUE
// ════════════════════════════════════════════════════
let syncQueued=false;
function queueSync(){
  if(syncQueued)return;
  syncQueued=true;
  setTimeout(()=>{
    syncQueued=false;
    if(db&&syncUserId){syncToFirestore(buildPayload()).catch(()=>{});}
  },1000);
}

// ════════════════════════════════════════════════════
// SUBJECTS
// ════════════════════════════════════════════════════
function addSubject(name){
  if(!name)return;
  if(subjects.find(s=>s.name===name))return;
  subjects.push({name,color:PAL[subjects.length%PAL.length],goal_h:0});
  ssNow('subjects_v2',subjects);queueSync();render();
}
function deleteSubject(name){
  subjects=subjects.filter(s=>s.name!==name);
  ssNow('subjects_v2',subjects);
  if(log[name]){delete log[name];ssNow('log:'+todayKey(),log);}
  queueSync();render();
}
function updateSubjectColor(name,col){
  const s=subjects.find(x=>x.name===name);if(!s)return;
  s.color=col;ssNow('subjects_v2',subjects);queueSync();render();
}
function updateSubjectGoal(name,h){
  const s=subjects.find(x=>x.name===name);if(!s)return;
  s.goal_h=Math.max(0,parseInt(h)||0);ssNow('subjects_v2',subjects);queueSync();render();
}

function renderChart(){
  let html='<div style="overflow:auto;height:100%;padding:0;"><div style="padding:24px;">';
  html+='<div style="display:flex;gap:8px;margin-bottom:20px;"><button class="ebtn" onclick="chartNav(-1)">← Month</button><span style="flex:1;text-align:center;font-size:13px;">'+new Date(chartYr,chartMo,1).toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</span><button class="ebtn" onclick="chartNav(1)">Month →</button></div>';
  const daysInMonth=new Date(chartYr,chartMo+1,0).getDate();
  const dayData={};
  for(let d=1;d<=daysInMonth;d++){const key=`${chartYr}-${String(chartMo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const dayLog=ls('log:'+key,{});const tot=Object.values(dayLog).reduce((a,b)=>a+b,0);dayData[d]=tot;}
  const maxVal=Math.max(...Object.values(dayData));
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px;">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>html+=`<div style="text-align:center;font-size:9px;color:var(--t4);margin-bottom:6px;">${d}</div>`);
  const startDay=new Date(chartYr,chartMo,1).getDay();
  for(let i=0;i<startDay;i++)html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const pct=maxVal>0?dayData[d]/maxVal:0;
    const shade=Math.ceil(pct*9);
    const bgOpacity=0.2+(shade/10)*0.8;
    html+=`<div style="aspect-ratio:1;background:${sc('Math')}${Math.round(bgOpacity*255).toString(16).padStart(2,'0')};border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:all .2s;" onclick="go('stats')" title="${fmtH(dayData[d])}">${d}</div>`;

  html+='</div></div>';

function chartNav(dir){
  chartMo+=dir;
  if(chartMo<0){chartMo=11;chartYr--;}
  if(chartMo>11){chartMo=0;chartYr++;}
  renderChart();
}

function renderStats(){
  let html='<div style="overflow:auto;height:100%;padding:0;"><div style="padding:24px;">';
  const ranges={week:'7d',month:'30d',year:'365d'};
  html+='<div style="display:flex;gap:6px;margin-bottom:20px;">';
  for(const[k,v] of Object.entries(ranges)){html+=`<button class="ebtn${statsRange===k?' pressed':''}" onclick="statsRange='${k}';renderStats()">${v}</button>`;}
  html+='</div>';
  const days=statsRange==='week'?7:statsRange==='month'?30:365;
  const data={};subjects.forEach(s=>data[s.name]=0);
  for(let i=0;i<days;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const key='log:'+dkeyFor(d);
    const dayLog=ls(key,{});
    for(const[subj,sec] of Object.entries(dayLog)){if(data[subj]!==undefined)data[subj]+=sec;}

  const sorted=subjects.sort((a,b)=>(data[b.name]||0)-(data[a.name]||0));

    html+=`<div style="margin-bottom:20px;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><div style="font-size:11px;color:var(--t3);letter-spacing:.1em;">${s.name}</div><div style="font-size:13px;color:${s.color};font-weight:600;">${fmtH(sec)}</div></div><div style="background:var(--border2);border-radius:4px;height:12px;"><div style="width:${sec>0?Math.min(100,sec/ggs()*100):0}%;height:100%;background:${s.color};border-radius:4px;"></div></div></div>`;

  document.getElementById('stats').innerHTML=html;
}

// SOUND ENGINE
// ════════════════════════════════════════════════════
function sndSetVol(v){sndVol=Math.max(0,Math.min(1,parseFloat(v)));ss('snd_vol',sndVol);if(sndGain)sndGain.gain.value=sndVol;document.getElementById('snd-vp').textContent=Math.round(sndVol*100)+'%';}
function testSound(){const mode=ls('sound_mode','');if(mode)playSoundMode(mode);}
function stopSound(){if(audioCtx){audioCtx.close();audioCtx=null;sndOscs=[];}sndPlaying=null;}
function setSoundMode(mode){ss('sound_mode',mode);}
function playSoundMode(mode){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  if(sndOscs.length>0)sndOscs.forEach(o=>o.stop());sndOscs=[];
  if(!sndGain){sndGain=audioCtx.createGain();sndGain.connect(audioCtx.destination);sndGain.gain.value=sndVol;}
  if(mode==='gamma'||mode==='alpha'){
    const freq=mode==='gamma'?40:10;
    const o1=audioCtx.createOscillator();const o2=audioCtx.createOscillator();
    o1.frequency.value=freq;o2.frequency.value=freq+0.5;
    o1.connect(sndGain);o2.connect(sndGain);
    o1.start();o2.start();
    sndOscs=[o1,o2];
    sndPlaying=mode;
  }else if(['brown','pink','white'].includes(mode)){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<buf.length;i++)data[i]=(Math.random()-0.5)*(mode==='brown'?0.5:mode==='pink'?0.8:1);
    const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;src.connect(sndGain);src.start();
    sndOscs=[src];
    sndPlaying=mode;
  }
}

// ════════════════════════════════════════════════════
// STREAK CALCULATION
// ════════════════════════════════════════════════════
function getStreak(){
  let streak=0;const ggs_sec=ggs();
  for(let i=0;i<365;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const key='log:'+dkeyFor(d);
    const dayLog=ls(key,{});
    const dayTotal=Object.values(dayLog).reduce((a,b)=>a+b,0);
    if(dayTotal>=ggs_sec)streak++;
    else break;
  }
  return streak;
}

// ════════════════════════════════════════════════════
// ALL TIME STATS
// ════════════════════════════════════════════════════
function allTimeSec(){
  let total=0;
  for(let d=0;d<365;d++){
    const date=new Date();date.setDate(date.getDate()-d);
    const key='log:'+dkeyFor(date);
    const dayLog=ls(key,{});
    total+=Object.values(dayLog).reduce((a,b)=>a+b,0);
  }
  return total;
}

// ════════════════════════════════════════════════════
// TIMER HELPERS
// ════════════════════════════════════════════════════
function tick(){
  if(!active||!t0)return;
  live=Math.floor((Date.now()-t0)/1000);
  render();
  if(total()>=ggs()&&!goalReached){
    goalReached=true;ssNow('gr:'+todayKey(),true);
    adrMode=true;
    showToast('🔥 ADRENALINE MODE','gold');
    vib([200,100,200,100,400]);
  }
}
function persistTimer(){
  ssNow('_active',active);
  ssNow('_t0',t0);
}
function clearPersistedTimer(){
  delete localStorage._active;
  delete localStorage._t0;
}
function reqWake(){
  if('serviceWorker' in navigator&&active)navigator.serviceWorker.controller&&navigator.serviceWorker.controller.postMessage({action:'wake'});
  if('wakeLock' in navigator){navigator.wakeLock.request('screen').then(l=>{wakeLock=l;}).catch(e=>console.log('Wake lock failed',e));}
}
function relWake(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
}

// ════════════════════════════════════════════════════
// MILESTONES
// ════════════════════════════════════════════════════
function checkMilestones(){
  const h=allTimeSec()/3600,lm=ls('last_milestone',0);
  const nm=MS.filter(m=>h>=m&&m>lm);
  if(nm.length){const hit=nm[nm.length-1];ss('last_milestone',hit);showToast('🏆 '+hit+'h milestone!','gold');vib([200,100,200,100,400]);}
}

// ════════════════════════════════════════════════════
// INIT APP (local data + firebase init)
// ════════════════════════════════════════════════════
function initApp(){
  _lightMode=ls('light_mode',false);
  if(_lightMode)document.body.classList.add('light');
  sndVol=parseFloat(ls('snd_vol',0.6));
  sndOpen=ls('snd_open',false);
  pomoCfg=ls('pomo_cfg',{work:25,shortBreak:5,longBreak:15,rounds:4});
  syncUsername=ls('username','Anon');

  const v2=ls('subjects_v2',null);
  if(v2){subjects=v2;}else{const old=ls('subjects',['Math','Physics','Biology']);subjects=old.map((name,i)=>({name,color:PAL[i%PAL.length],goal_h:0}));ss('subjects_v2',subjects);}
  subjects.forEach(s=>{if(s.goal_h==null)s.goal_h=0;});

  checkDayRollover();
  log=ls('log:'+todayKey(),{});
  goalReached=ls('gr:'+todayKey(),false);

  const savedActive=ls('_active',null),savedT0=ls('_t0',null);
  if(savedActive&&savedT0&&subjects.find(s=>s.name===savedActive)){
    active=savedActive;t0=savedT0;live=Math.floor((Date.now()-t0)/1000);
    const startDay=dkeyFor(new Date(t0));
    if(startDay!==todayKey()){
      const yLog=ls('log:'+startDay,{});const endOfDay=new Date(t0);endOfDay.setHours(23,59,59,999);
      yLog[active]=(yLog[active]||0)+Math.max(0,Math.floor((endOfDay-t0)/1000));
      ssNow('log:'+startDay,yLog);clearPersistedTimer();active=null;live=0;t0=null;
    }else{
      adrMode=goalReached&&total()>=ggs();
      ticker=setInterval(tick,1000);reqWake();
      if(live>60)showToast('Restored — '+fmt(live)+' tracked','info');
    }
  }
  adrMode=goalReached&&total()>=ggs();
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  document.getElementById('gtgt').textContent=ls('goal_h',6)+'h goal';

  document.addEventListener('keydown',handleKeyNav);
  document.addEventListener('visibilitychange',()=>{
    checkDayRollover();
    if(document.visibilityState==='visible'){
      if(active&&t0){live=Math.floor((Date.now()-t0)/1000);render();}
      if(active)reqWake();
      if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
      updateBgBar();
    }else updateBgBar();
  });
  setInterval(()=>{checkDayRollover();},60000);
  render();

  // ════════════════════════════════════════════════════
  // KEYBOARD NAVIGATION
  // ════════════════════════════════════════════════════
  function handleKeyNav(e){
    if(e.altKey){
      const map={'1':'today','2':'chart','3':'stats','4':'lb','5':'edit','6':'settings'};
      if(map[e.key]){go(map[e.key]);e.preventDefault();}
    }
    if(e.key==='Escape'){
      document.querySelectorAll('.ov.show').forEach(el=>el.classList.remove('show'));
    }
  }

  // ════════════════════════════════════════════════════
  // TAP & SESSION
  // ════════════════════════════════════════════════════
  function tap(i){
    const n=subjects[i].name;
    if(active===n){stopTimer();}else{startTimer(n);}
  }
  function startTimer(name){
    if(active)stopTimer();
    active=name;live=0;t0=Date.now();
    persistTimer();vib(60);reqWake();
    ticker=setInterval(tick,1000);
    document.title=name+' · Dead-line';
    announce('Started: '+name);
    render();
  }
  function stopTimer(){
    if(!active)return;
    clearInterval(ticker);ticker=null;
    const added=Math.floor((Date.now()-t0)/1000);
    log[active]=(log[active]||0)+added;ssNow('log:'+todayKey(),log);
    const startH=new Date(t0).getHours();
    const sess=ls('sessions:'+todayKey(),[]);sess.push({name:active,h:startH,dur:added});ssNow('sessions:'+todayKey(),sess);
    clearPersistedTimer();relWake();
    const stopped=active;
    vib([40,30,40]);active=null;live=0;t0=null;
    document.title='Dead-line';
    announce('Stopped: '+stopped+' — '+fmt(added)+' logged');
    updateBgBar();
    queueSync();
    render();
  }
  function openSessModal(){
    sessEditTarget=null;
    document.getElementById('sess-ov-title').textContent='Add session';
    const sel=document.getElementById('sess-sub');
    sel.innerHTML=subjects.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
    document.getElementById('sess-dur').value='';
    document.getElementById('sess-hour').value=new Date().getHours();
    document.getElementById('sess-ov').classList.add('show');
    setTimeout(()=>document.getElementById('sess-dur').focus(),80);
  }
  function openSessEditModal(dateKey,idx){
    sessEditTarget={dateKey,idx};
    const sess=ls('sessions:'+dateKey,[]);
    const s=sess[idx];if(!s)return;
    document.getElementById('sess-ov-title').textContent='Edit session';
    const sel=document.getElementById('sess-sub');
    sel.innerHTML=subjects.map(sub=>`<option value="${sub.name}"${sub.name===s.name?' selected':''}>${sub.name}</option>`).join('');
    document.getElementById('sess-dur').value=Math.round(s.dur/60);
    document.getElementById('sess-hour').value=s.h;
    document.getElementById('sess-ov').classList.add('show');
  }
  function closeSessModal(){document.getElementById('sess-ov').classList.remove('show');sessEditTarget=null;}
  function saveSessModal(){
    const sub=document.getElementById('sess-sub').value;
    const dur=parseInt(document.getElementById('sess-dur').value)*60;
    const h=parseInt(document.getElementById('sess-hour').value);
    if(!sub||isNaN(dur)||dur<=0||isNaN(h)||h<0||h>23){showToast('Check inputs');return;}
    if(sessEditTarget){
      const sess=ls('sessions:'+sessEditTarget.dateKey,[]);
      const old=sess[sessEditTarget.idx];
      const logKey='log:'+sessEditTarget.dateKey;
      const dayLog=ls(logKey,{});
      dayLog[old.name]=Math.max(0,(dayLog[old.name]||0)-old.dur);
      dayLog[sub]=(dayLog[sub]||0)+dur;
      ssNow(logKey,dayLog);
      sess[sessEditTarget.idx]={name:sub,h,dur};
      ssNow('sessions:'+sessEditTarget.dateKey,sess);
      if(sessEditTarget.dateKey===todayKey())log=ls('log:'+todayKey(),{});
    }else{
      const sess=ls('sessions:'+todayKey(),[]);sess.push({name:sub,h,dur});ssNow('sessions:'+todayKey(),sess);
      log[sub]=(log[sub]||0)+dur;ssNow('log:'+todayKey(),log);
    }
    closeSessModal();
    queueSync();
    render();
  }
  function deleteSess(dateKey,idx){
    const sess=ls('sessions:'+dateKey,[]);const s=sess[idx];if(!s)return;
    const logKey='log:'+dateKey;const dayLog=ls(logKey,{});
    dayLog[s.name]=Math.max(0,(dayLog[s.name]||0)-s.dur);ssNow(logKey,dayLog);
    sess.splice(idx,1);ssNow('sessions:'+dateKey,sess);
    if(dateKey===todayKey()){log=ls('log:'+todayKey(),{});render();}
    queueSync();
  }

  // ════════════════════════════════════════════════════
  // SCREENSHOT
  // ════════════════════════════════════════════════════
  function takeScreenshot(){
    document.getElementById('shot-ov').classList.add('show');
    document.getElementById('shot-preview').style.display='none';
    document.getElementById('shot-dl-btn').style.display='none';
    document.getElementById('shot-loading').style.display='block';
    setTimeout(drawShot,80);
  }
  function drawShot(){
    const canvas=document.getElementById('shot-canvas');
    const W=400,H=320;canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    const isDark=!_lightMode;
    ctx.fillStyle=isDark?'#080808':'#f5f5f0';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=isDark?'#0d0d0d':'#ebebeb';
    roundRect(ctx,16,16,W-32,H-32,12);ctx.fill();
    ctx.font='bold 22px ui-monospace,monospace';ctx.fillStyle=isDark?'#e8e8e8':'#111';
    ctx.fillText('Dead-line',32,52);
    ctx.font='10px ui-monospace,monospace';ctx.fillStyle=isDark?'#555':'#888';
    ctx.fillText(new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}),32,70);
    ctx.font='bold 36px ui-monospace,monospace';ctx.fillStyle=isDark?'#C8FF00':'#5a8a00';
    ctx.fillText(fmt(total()),32,110);
    ctx.font='10px ui-monospace,monospace';ctx.fillStyle=isDark?'#555':'#888';
    ctx.fillText(ls('goal_h',6)+'h goal · '+Math.round(Math.min(100,total()/ggs()*100))+'%',32,128);
    let y=154;const tot=total();
    subjects.slice(0,6).forEach(s=>{
      const sec=ssec(s.name);if(!sec)return;
      const pct=tot>0?sec/tot:0;
      ctx.fillStyle=isDark?'#1a1a1a':'#d0d0c8';roundRect(ctx,32,y,W-64,6,3);ctx.fill();
      ctx.fillStyle=s.color;roundRect(ctx,32,y,Math.max(4,(W-64)*pct),6,3);ctx.fill();
      ctx.font='11px ui-monospace,monospace';ctx.fillStyle=isDark?'#999':'#555';ctx.fillText(s.name,32,y-4);
      ctx.fillStyle=isDark?'#ccc':'#333';ctx.textAlign='right';ctx.fillText(fmt(sec),W-32,y-4);ctx.textAlign='left';
      y+=28;
    });
    const streak=getStreak();
    if(streak>0){ctx.font='11px ui-monospace,monospace';ctx.fillStyle=isDark?'#FF9F40':'#c07000';ctx.fillText('🔥 '+streak+' day streak',32,H-30);}
    ctx.font='9px ui-monospace,monospace';ctx.fillStyle=isDark?'#2a2a2a':'#aaa';ctx.textAlign='right';ctx.fillText('Dead-line',W-32,H-30);ctx.textAlign='left';
    const img=document.getElementById('shot-preview');
    img.src=canvas.toDataURL('image/png');
    img.style.display='block';
    document.getElementById('shot-loading').style.display='none';
    document.getElementById('shot-dl-btn').style.display='';
  }
  function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
  function downloadShot(){
    const canvas=document.getElementById('shot-canvas');
    const a=document.createElement('a');a.download='dead-line-'+todayKey()+'.png';a.href=canvas.toDataURL('image/png');document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function closeShot(){document.getElementById('shot-ov').classList.remove('show');}

  // ════════════════════════════════════════════════════
  // SYNC MODAL
  // ════════════════════════════════════════════════════
  function openSyncModal(){
    document.getElementById('sm-name').value=ls('username','');
    document.getElementById('sm-status').textContent='';
    document.getElementById('sync-ov').classList.add('show');
    setTimeout(()=>document.getElementById('sm-name').focus(),80);
  }
  function closeSyncModal(){document.getElementById('sync-ov').classList.remove('show');}
  async function smSave(){
    const name=document.getElementById('sm-name').value.trim();
    const st=document.getElementById('sm-status');
    if(name){ssNow('username',name);syncUsername=name;}
    closeSyncModal();
    if(db){
      st.textContent='Connecting…';st.className='sm-status';
      syncToFirestore(buildPayload());
    }
  }

  // ════════════════════════════════════════════════════
  // TOAST
  // ════════════════════════════════════════════════════
  function showToast(msg,type=''){
    const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;
    t.setAttribute('role','alert');t.setAttribute('aria-live','assertive');
    document.body.appendChild(t);setTimeout(()=>t.remove(),2700);
    announce(msg);
  }

  // ════════════════════════════════════════════════════
  // SETTINGS HELPERS
  // ════════════════════════════════════════════════════
  function savePomoCfg(key,val){pomoCfg[key]=Math.max(1,parseInt(val)||1);ss('pomo_cfg',pomoCfg);}
  function toggleHighContrast(on){
    ss('high_contrast',on);
    if(on){document.documentElement.style.setProperty('--border','#444');document.documentElement.style.setProperty('--border2','#555');document.documentElement.style.setProperty('--t3','#bbb');}
    else{document.documentElement.style.removeProperty('--border');document.documentElement.style.removeProperty('--border2');document.documentElement.style.removeProperty('--t3');}
    announce(on?'High contrast on':'High contrast off');
  }
  function toggleReduceMotion(on){
    ss('reduce_motion',on);
    document.documentElement.style.setProperty('--reduce-motion',on?'1':'0');
    if(on){const s=document.createElement('style');s.id='rm-style';s.textContent='*{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}';if(!document.getElementById('rm-style'))document.head.appendChild(s);}
    else{const s=document.getElementById('rm-style');if(s)s.remove();}
    announce(on?'Reduce motion on':'Reduce motion off');
  }
  function updateUsername(val){const v=val.trim();if(!v)return;syncUsername=v;ssNow('username',v);queueSync();if(db)pushLeaderboardFirestore().catch(()=>{});}
  function confirmReset(){if(confirm('Delete ALL study data? This cannot be undone.'))resetData();}
  function resetData(){if(active)stopTimer();localStorage.clear();location.reload();}

  // ════════════════════════════════════════════════════
  // AUTH STATE LISTENER (after initApp setup)
  // ════════════════════════════════════════════════════
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      syncUserId = user.uid;
      if (document.getElementById('login-screen').classList.contains('hidden') === false) {
        onAuthSuccess(user);
      }
      // Initialize Firestore ONLY after user is authenticated
      if (!db) {
        initializeFirestore();
      }
    } else {
      syncUserId = null;
      document.getElementById('login-screen').classList.remove('hidden');
    }
  });

  // Initial render
  render();
  go('today');
}

// ════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  initApp();
});

if(ls('light_mode',false)){document.body.classList.add('light');const b=document.getElementById('theme-btn');if(b)b.textContent='🌙';}
if(ls('high_contrast',false))toggleHighContrast(true);
if(ls('reduce_motion',false))toggleReduceMotion(true);
</script>
